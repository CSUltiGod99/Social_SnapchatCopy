<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Picture and Text Boxes</title>
    <style>
        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            padding: 20px;
        }

        .box {
            border: 1px solid #ddd;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease;
        }

        .box:hover {
            transform: translateY(-5px);
        }

        .box img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            display: block;
        }

        .box-content {
            padding: 20px;
        }

        .box-content h3 {
            margin: 0 0 10px 0;
            color: #333;
        }

        .box-content p {
            margin: 0;
            color: #666;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Box 1 -->
        <div class="box">
            <img src="image1.jpg" alt="Description 1">
            <div class="box-content">
                <h3>Title One</h3>
                <p>This is the description text for the first item. Add any information you want here.</p>
            </div>
        </div>

        <!-- Box 2 -->
        <div class="box">
            <img src="image2.jpg" alt="Description 2">
            <div class="box-content">
                <h3>Title Two</h3>
                <p>This is the description text for the second item.</p>
            </div>
        </div>

        <!-- Box 3 -->
        <div class="box">
            <img src="image3.jpg" alt="Description 3">
            <div class="box-content">
                <h3>Title Three</h3>
                <p>This is the description text for the third item.</p>
            </div>
        </div>
    </div>
</body>
</html>
